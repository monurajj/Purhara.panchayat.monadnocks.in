<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Focus Areas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="site-body bg-gray-50 min-h-screen flex flex-col" data-page-title="Focus Areas">
  <header id="site-header"></header>

  <main class="page-main flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-4 sm:py-6">
    <h2 class="page-title font-bold text-gray-900 mb-6" data-i18n="focusAreas.title">Focus Area Analysis</h2>
    <div id="focus-sections" class="space-y-6"></div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/main.js"></script>
  <script>
    const FOCUS_ICONS = {
      'Sanitation': 'fa-toilet',
      'Drinking water': 'fa-tint',
      'Social welfare': 'fa-hands-helping',
      'Rural electrification': 'fa-bolt',
      'Agriculture': 'fa-seedling',
      'Cultural activities': 'fa-theater-masks',
      'Minor forest produce': 'fa-tree',
      'Roads': 'fa-road',
      'Land improvement': 'fa-mountain',
      'Markets and fairs': 'fa-store',
    };

    async function initFocusAreas() {
      await initApp('focus-areas');
      const projects = getProjects();
      const focusAreas = getFocusAreas();
      const container = document.getElementById('focus-sections');

      container.innerHTML = focusAreas.map(fa => {
        const items = projects.filter(p => p.focus_area === fa.en);
        const totalCost = sumBy(items, 'total_cost');
        const icon = FOCUS_ICONS[fa.en] || 'fa-circle';

        return `
          <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 bg-gray-50 border-b">
              <div class="flex items-center gap-3">
                <i class="fas ${icon} text-green-700 text-xl"></i>
                <h3 class="text-lg font-bold">${getLang() === 'hi' ? fa.hi : fa.en}</h3>
              </div>
              <div class="text-right">
                <span class="text-2xl font-bold text-green-700">${items.length}</span>
                <span class="text-sm text-gray-500 ml-1" data-i18n="focusAreas.projects">projects</span>
                <p class="text-sm font-medium text-gray-600">${formatCurrency(totalCost)}</p>
              </div>
            </div>
            <div class="p-4">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-48 overflow-y-auto">
                ${items.slice(0, 6).map(p => `
                  <div class="flex items-center justify-between p-2 rounded hover:bg-green-50 text-sm">
                    <span class="truncate flex-1 mr-2">${field(p, 'activity_description').substring(0, 50)}...</span>
                    <button onclick="showProjectModal(appData.projects.find(x=>x.s_no===${p.s_no}))" class="text-green-700 shrink-0">
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                `).join('')}
              </div>
              <a href="${buildTableUrl({ focusArea: fa.en })}" class="inline-block mt-3 text-green-700 font-medium text-sm hover:underline">
                <i class="fas fa-list mr-1"></i> <span data-i18n="focusAreas.viewAll">View All</span> (${items.length})
              </a>
            </div>
          </div>
        `;
      }).join('');

      applyTranslations();
      renderFooter();
    }
    initFocusAreas();
  </script>
</body>
</html>
