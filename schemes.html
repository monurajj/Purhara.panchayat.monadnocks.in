<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Schemes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="site-body bg-gray-50 min-h-screen flex flex-col" data-page-title="Schemes">
  <header id="site-header"></header>

  <main class="page-main flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-4 sm:py-6">
    <h2 class="page-title font-bold text-gray-900 mb-6" data-i18n="schemes.title">Scheme-wise Details</h2>
    <div id="scheme-sections" class="space-y-8"></div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/main.js"></script>
  <script>
    async function initSchemes() {
      await initApp('schemes');
      const projects = getProjects();
      const schemes = getSchemes();
      const container = document.getElementById('scheme-sections');

      container.innerHTML = schemes.map(scheme => {
        const schemeProjects = projects.filter(p => p.scheme_name === scheme.scheme_name);
        const util = ((scheme.expenditure_amount / scheme.receipt_amount) * 100).toFixed(1);

        return `
          <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-green-800 text-white px-6 py-4">
              <h3 class="text-lg font-bold">${field(scheme, 'scheme_name')}</h3>
            </div>
            <div class="p-6">
              <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                <div class="bg-green-50 rounded-lg p-4">
                  <p class="text-xs text-gray-500" data-i18n="schemes.receipt">Receipt</p>
                  <p class="text-xl font-bold text-green-800">${formatCurrency(scheme.receipt_amount)}</p>
                </div>
                <div class="bg-blue-50 rounded-lg p-4">
                  <p class="text-xs text-gray-500" data-i18n="schemes.expenditure">Expenditure</p>
                  <p class="text-xl font-bold text-blue-800">${formatCurrency(scheme.expenditure_amount)}</p>
                </div>
                <div class="bg-yellow-50 rounded-lg p-4">
                  <p class="text-xs text-gray-500" data-i18n="financial.utilizationPct">Utilization %</p>
                  <p class="text-xl font-bold text-yellow-800">${util}%</p>
                </div>
              </div>
              <h4 class="font-semibold mb-3" data-i18n="schemes.projects">Projects under Scheme</h4>
              <div class="overflow-x-auto max-h-64 overflow-y-auto">
                <table class="w-full text-sm">
                  <thead class="bg-gray-100 sticky top-0">
                    <tr>
                      <th class="px-3 py-2 text-left" data-i18n="table.sNo">S.No</th>
                      <th class="px-3 py-2 text-left" data-i18n="table.description">Description</th>
                      <th class="px-3 py-2 text-left" data-i18n="table.focusArea">Focus Area</th>
                      <th class="px-3 py-2 text-left" data-i18n="table.cost">Cost</th>
                      <th class="px-3 py-2"></th>
                    </tr>
                  </thead>
                  <tbody>
                    ${schemeProjects.map(p => `
                      <tr class="border-b hover:bg-green-50">
                        <td class="px-3 py-2">${p.s_no}</td>
                        <td class="px-3 py-2 max-w-xs truncate">${field(p, 'activity_description')}</td>
                        <td class="px-3 py-2">${field(p, 'focus_area')}</td>
                        <td class="px-3 py-2 font-medium">${formatCurrency(p.total_cost)}</td>
                        <td class="px-3 py-2">
                          <button onclick="showProjectModal(appData.projects.find(x=>x.s_no===${p.s_no}))" class="text-green-700 hover:underline text-xs">
                            <i class="fas fa-eye"></i>
                          </button>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
              <a href="${buildTableUrl({ scheme: scheme.scheme_name })}" class="inline-block mt-4 text-green-700 font-medium text-sm hover:underline">
                <i class="fas fa-external-link-alt mr-1"></i> <span data-i18n="focusAreas.viewAll">View All</span>
              </a>
            </div>
          </div>
        `;
      }).join('');

      applyTranslations();
      renderFooter();
    }
    initSchemes();
  </script>
</body>
</html>
