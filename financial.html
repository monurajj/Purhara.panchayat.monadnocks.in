<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Financial Transparency</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/custom.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="site-body bg-gray-50 min-h-screen flex flex-col" data-page-title="Financial">
  <header id="site-header"></header>

  <main class="page-main flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-4 sm:py-6">
    <h2 class="page-title font-bold text-gray-900 mb-6" data-i18n="financial.title">Financial Transparency</h2>

    <!-- Summary Cards -->
    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl shadow-md p-5 border-l-4 border-green-600">
        <p class="text-xs text-gray-500" data-i18n="stats.receipt">Total Receipt</p>
        <p id="fin-receipt" class="text-2xl font-bold text-green-800 mt-1"></p>
      </div>
      <div class="bg-white rounded-xl shadow-md p-5 border-l-4 border-blue-600">
        <p class="text-xs text-gray-500" data-i18n="stats.expenditure">Total Expenditure</p>
        <p id="fin-expenditure" class="text-2xl font-bold text-blue-800 mt-1"></p>
      </div>
      <div class="bg-white rounded-xl shadow-md p-5 border-l-4 border-yellow-500">
        <p class="text-xs text-gray-500" data-i18n="financial.unspent">Unspent Funds</p>
        <p id="fin-unspent" class="text-2xl font-bold text-yellow-800 mt-1"></p>
      </div>
      <div class="bg-white rounded-xl shadow-md p-5 border-l-4 border-purple-600">
        <p class="text-xs text-gray-500" data-i18n="stats.perCapita">Per Capita Spending</p>
        <p id="fin-percapita" class="text-2xl font-bold text-purple-800 mt-1"></p>
      </div>
    </section>

    <!-- Scheme Comparison -->
    <section class="content-panel bg-white rounded-xl shadow-md p-6 mb-8">
      <h3 class="font-semibold text-lg mb-4" data-i18n="financial.comparison">Scheme Comparison</h3>
      <p class="table-scroll-hint" data-i18n="table.scrollHint">Swipe sideways to see all columns →</p>
      <div class="table-scroll-wrap">
        <table class="data-table w-full text-sm" style="min-width:36rem">
          <thead class="bg-green-800 text-white">
            <tr>
              <th class="px-4 py-3 text-left" data-i18n="financial.scheme">Scheme</th>
              <th class="px-4 py-3 text-right" data-i18n="financial.receipt">Receipt</th>
              <th class="px-4 py-3 text-right" data-i18n="financial.expenditure">Expenditure</th>
              <th class="px-4 py-3 text-right" data-i18n="financial.balance">Balance</th>
              <th class="px-4 py-3 text-right" data-i18n="financial.utilizationPct">Utilization %</th>
            </tr>
          </thead>
          <tbody id="scheme-comparison-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Village Fund Chart -->
    <section class="bg-white rounded-xl shadow-md p-6 mb-8">
      <h3 class="font-semibold text-lg mb-4" data-i18n="financial.villageFunds">Village-wise Fund Allocation</h3>
      <div class="chart-container"><canvas id="chart-financial-village"></canvas></div>
    </section>

    <!-- Irregularities -->
    <section class="bg-white rounded-xl shadow-md p-6">
      <h3 class="font-semibold text-lg mb-4 flex items-center gap-2">
        <i class="fas fa-exclamation-circle text-red-600"></i>
        <span data-i18n="financial.irregularities">Detected Irregularities</span>
      </h3>
      <div id="irregularities-list" class="space-y-3"></div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/main.js"></script>
  <script>
    async function initFinancial() {
      await initApp('financial');
      const data = appData;
      const fp = data.financial_progress;
      const meta = data.meta;
      const unspent = fp.receipt - fp.expenditure;
      const perCapita = fp.expenditure / meta.population;

      document.getElementById('fin-receipt').textContent = formatCurrency(fp.receipt);
      document.getElementById('fin-expenditure').textContent = formatCurrency(fp.expenditure);
      document.getElementById('fin-unspent').textContent = formatCurrency(unspent);
      document.getElementById('fin-percapita').textContent = formatCurrency(Math.round(perCapita));

      document.getElementById('scheme-comparison-tbody').innerHTML = data.schemes.map(s => {
        const balance = s.receipt_amount - s.expenditure_amount;
        const util = ((s.expenditure_amount / s.receipt_amount) * 100).toFixed(1);
        return `
          <tr class="border-b hover:bg-green-50">
            <td class="px-4 py-3 font-medium">${field(s, 'scheme_name')}</td>
            <td class="px-4 py-3 text-right">${formatCurrency(s.receipt_amount)}</td>
            <td class="px-4 py-3 text-right">${formatCurrency(s.expenditure_amount)}</td>
            <td class="px-4 py-3 text-right ${balance < 0 ? 'text-red-600 font-bold' : ''}">${formatCurrency(balance)}</td>
            <td class="px-4 py-3 text-right">${util}%</td>
          </tr>
        `;
      }).join('');

      renderFinancialChart(getProjects());

      const issues = detectFinancialIrregularities(data);
      const list = document.getElementById('irregularities-list');
      if (issues.length === 0) {
        list.innerHTML = `<p class="text-green-600"><i class="fas fa-check-circle mr-1"></i> No irregularities detected.</p>`;
      } else {
        list.innerHTML = issues.map(issue => `
          <div class="red-flag rounded-lg p-4 flex items-start gap-3">
            <i class="fas fa-flag text-red-600 mt-1"></i>
            <div>
              <span class="text-xs font-bold uppercase text-red-600">${issue.severity}</span>
              <p class="text-gray-800">${getLang() === 'hi' ? issue.message.hi : issue.message.en}</p>
            </div>
          </div>
        `).join('');
      }

      renderFooter();
    }
    initFinancial();
  </script>
</body>
</html>
